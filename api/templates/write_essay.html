<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Essay - PTE Practice</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="page-container">
        <div class="page-header">
            <a href="/" class="back-link">← Back to Dashboard</a>
            <h1 class="page-title">Write Essay (AI Score)</h1>
            <p class="page-subtitle">Timed essay writing with AI scoring is coming soon.</p>
            <div class="hero-meta">
                <span class="hero-pill">Argument Structure</span>
                <span class="hero-pill">Coherence + Grammar</span>
                <span class="hero-pill">AI Scoring</span>
            </div>
        </div>

        <div class="coming-soon-wrap">
            <h2 class="section-title">Feature preview</h2>
            <div class="task-container" style="margin-top: 0;">
                <label><strong>Essay Prompt (Preview)</strong></label>
                <textarea rows="5" disabled placeholder="Essay question prompt will appear here."></textarea>
                <div class="controls" style="margin-top: 0.7rem;">
                    <span class="card-badge badge-progress">20 min Timer</span>
                    <span class="card-badge badge-progress">Word Count</span>
                    <span class="card-badge badge-progress">Draft Support</span>
                </div>
                <label style="display: block; margin-top: 0.7rem;"><strong>Your Essay (Preview)</strong></label>
                <textarea rows="10" disabled placeholder="Essay editor will be enabled when feature launches."></textarea>
                <div class="controls" style="margin-top: 0.8rem;">
                    <button class="btn secondary" disabled>Score Essay</button>
                    <button class="btn secondary" disabled>Improvement Hints</button>
                </div>
                <p style="margin: 0.4rem 0 0; color: #60748d;">Soon available to non finished feature.</p>
            </div>
        </div>
    </div>
</body>

</html>
