<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summarize Written Text - PTE Practice</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="page-container">
        <div class="page-header">
            <a href="/" class="back-link">← Back to Dashboard</a>
            <h1 class="page-title">Summarize Written Text (AI Score)</h1>
            <p class="page-subtitle">This writing module is under active build and will be released soon.</p>
            <div class="hero-meta">
                <span class="hero-pill">One-Sentence Summary</span>
                <span class="hero-pill">Grammar + Content</span>
                <span class="hero-pill">AI Writing Score</span>
            </div>
        </div>

        <div class="coming-soon-wrap">
            <h2 class="section-title">Feature preview</h2>
            <div class="task-container" style="margin-top: 0;">
                <label><strong>Source Passage (Preview)</strong></label>
                <textarea rows="6" disabled placeholder="Source text will appear here in the final version."></textarea>
                <label style="display: block; margin-top: 0.8rem;"><strong>Your One-Sentence Summary (Preview)</strong></label>
                <textarea rows="4" disabled placeholder="Write your one-sentence summary here."></textarea>
                <div class="controls" style="margin-top: 0.8rem;">
                    <button class="btn secondary" disabled>Generate AI Score</button>
                    <button class="btn secondary" disabled>See Rubric Feedback</button>
                </div>
                <p style="margin: 0.4rem 0 0; color: #60748d;">Soon available to non finished feature.</p>
            </div>
        </div>
    </div>
</body>

</html>
