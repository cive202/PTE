<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Choice (Multiple) - PTE Practice</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .filter-shell {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.75rem;
            margin: 0.85rem 0;
            padding: 0.85rem;
            border: 1px solid #d6e1ed;
            border-radius: 14px;
            background: #f7fbff;
            align-items: end;
        }

        .filter-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            color: #4f637c;
            margin-bottom: 0.35rem;
        }

        .filter-select {
            width: 100%;
            border: 1px solid #c9d8ea;
            background: #ffffff;
            color: #23364f;
            border-radius: 10px;
            padding: 0.48rem 0.65rem;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .topic-count {
            color: #5d728a;
            font-size: 0.9rem;
            margin: 0.3rem 0 0.65rem;
            font-weight: 600;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 0.8rem;
        }

        .topic-card {
            background: #ffffff;
            border: 1px solid #d5e2f0;
            border-radius: 12px;
            padding: 0.9rem 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .topic-card:hover {
            transform: translateY(-2px);
            border-color: #0f6ac9;
            box-shadow: 0 8px 16px rgba(15, 106, 201, 0.13);
        }

        .topic-card.active {
            border-color: #0f6ac9;
            box-shadow: 0 0 0 2px rgba(15, 106, 201, 0.15);
            background: #f2f8ff;
        }

        .topic-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1d2f45;
            margin-bottom: 0.45rem;
            line-height: 1.35;
        }

        .topic-card-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .topic-meta-pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 1px solid #d2ddea;
            background: #f6f9fe;
            color: #3a516d;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            padding: 0.16rem 0.52rem;
        }

        .topic-empty {
            grid-column: 1 / -1;
            border: 1px dashed #c6d7ec;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            color: #526983;
            background: #f9fcff;
            font-weight: 600;
        }

        .audio-shell {
            padding: 0.9rem 1rem;
            border: 1px solid #d6e1ed;
            border-radius: 14px;
            background: #f8fbff;
        }

        .question-box {
            margin-top: 0.95rem;
            padding: 0.85rem 1rem;
            border: 1px solid #d6e1ed;
            border-radius: 14px;
            background: #ffffff;
        }

        .question-title {
            margin: 0 0 0.7rem;
            color: #1d2f45;
            font-weight: 700;
        }

        .option-list {
            display: flex;
            flex-direction: column;
            gap: 0.52rem;
        }

        .option-row {
            display: flex;
            align-items: flex-start;
            gap: 0.55rem;
            padding: 0.55rem 0.62rem;
            border-radius: 10px;
            border: 1px solid #d6e1ed;
            background: #fdfefe;
            cursor: pointer;
        }

        .option-row:hover {
            border-color: #0f6ac9;
            background: #f5faff;
        }

        .option-row.correct {
            border-color: #1f8a4c;
            background: #e8f7ee;
        }

        .option-row.incorrect {
            border-color: #c93434;
            background: #fdeaea;
        }

        .option-row.missed {
            border-color: #9ac9ae;
            background: #f1f9f4;
        }

        .option-label {
            min-width: 1.3rem;
            color: #2f4863;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .filter-shell {
                grid-template-columns: 1fr;
            }

            #newTaskBtn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="page-header">
            <a href="/" class="back-link">← Back to Dashboard</a>
            <h1 class="page-title">Multiple Choice (Multiple Answers)</h1>
            <p class="page-subtitle">Listen once and select all correct responses from the options.</p>
            <div class="hero-meta">
                <span class="hero-pill">Listening Only</span>
                <span class="hero-pill">Partial Credit</span>
                <span class="hero-pill">+1 / -1 / Min 0</span>
            </div>
        </div>

        <div class="task-container">
            <h2 class="section-title">Task Setup</h2>
            <div class="filter-shell">
                <div>
                    <div class="filter-label">Category</div>
                    <select id="difficultySelect" class="filter-select">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <button class="btn secondary" id="newTaskBtn">Load Random</button>
            </div>
            <div class="topic-count" id="topicCount">Loading topics...</div>
            <div class="topic-grid" id="topicGrid"></div>
            <div id="status" style="display:none; margin-top: 0.9rem; padding: 0.7rem;"></div>
        </div>

        <div class="task-container" id="listeningSection" style="display:none;">
            <h2 class="section-title">Audio + Question</h2>
            <div class="audio-shell">
                <div style="font-weight:700; color:#39506b; margin-bottom:0.55rem;" id="taskTitle">Loading...</div>
                <div class="tts-toolbar">
                    <button id="btnReplayAudio" class="tts-pill-btn" type="button" title="Replay audio">🔊</button>
                    <select id="ttsSpeedSelect" class="tts-pill-select speed" aria-label="Playback speed"></select>
                    <select id="ttsVoiceSelect" class="tts-pill-select voice" aria-label="Voice persona"></select>
                </div>
                <p id="ttsMeta" class="tts-meta">Loading voice options...</p>
                <audio id="taskAudioPlayer" controls style="width:100%;"></audio>
            </div>

            <div class="question-box">
                <p class="question-title" id="questionText"></p>
                <div class="option-list" id="optionsList"></div>
            </div>

            <div class="controls" style="margin-top:0.9rem;">
                <button class="btn primary" id="scoreBtn">Check Answer</button>
                <button class="btn secondary" id="clearBtn">Clear</button>
            </div>
        </div>

        <div class="task-container" id="resultSection" style="display:none;">
            <h2 class="section-title">Score Report</h2>
            <div id="scoreHeadline" style="font-weight:700; color:#142031;"></div>
            <div id="analysisMeta" style="margin-top:0.75rem; color:#60748d;"></div>
            <div style="margin-top:0.9rem;">
                <strong>Feedback</strong>
                <ul id="feedbackList" style="margin-top:0.4rem;"></ul>
            </div>
        </div>
    </div>

    <script src="/static/js/tts_preset_controls.js"></script>
    <script>
        const TASK_SLUG = 'multiple-choice-multiple';

        const difficultySelect = document.getElementById('difficultySelect');
        const topicCount = document.getElementById('topicCount');
        const topicGrid = document.getElementById('topicGrid');
        const statusBox = document.getElementById('status');

        const listeningSection = document.getElementById('listeningSection');
        const resultSection = document.getElementById('resultSection');
        const taskTitle = document.getElementById('taskTitle');
        const questionText = document.getElementById('questionText');
        const optionsList = document.getElementById('optionsList');

        const taskAudioPlayer = document.getElementById('taskAudioPlayer');
        const btnReplayAudio = document.getElementById('btnReplayAudio');
        const ttsVoiceSelect = document.getElementById('ttsVoiceSelect');
        const ttsSpeedSelect = document.getElementById('ttsSpeedSelect');
        const ttsMeta = document.getElementById('ttsMeta');

        const scoreHeadline = document.getElementById('scoreHeadline');
        const analysisMeta = document.getElementById('analysisMeta');
        const feedbackList = document.getElementById('feedbackList');

        const newTaskBtn = document.getElementById('newTaskBtn');
        const scoreBtn = document.getElementById('scoreBtn');
        const clearBtn = document.getElementById('clearBtn');

        let currentTaskId = null;
        let currentOptions = [];
        let allTopics = [];
        let filteredTopics = [];

        const ttsController = window.createTtsPresetController({
            feature: 'listening',
            storagePrefix: 'listeningMcm',
            voiceSelect: ttsVoiceSelect,
            speedSelect: ttsSpeedSelect,
            metaLabel: ttsMeta,
            replayButton: btnReplayAudio,
            audioElement: taskAudioPlayer,
            onSelectionChange: () => {
                if (currentTaskId) {
                    refreshAudioSource(false);
                }
            },
        });

        function titleCase(value) {
            const text = String(value || '').trim().toLowerCase();
            if (!text) return '';
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function setStatus(message, isError = false) {
            statusBox.style.display = 'block';
            statusBox.className = isError ? 'error show' : 'success show';
            statusBox.textContent = message;
        }

        function clearStatus() {
            statusBox.style.display = 'none';
            statusBox.className = '';
            statusBox.textContent = '';
        }

        function renderCategoryOptions(categories) {
            difficultySelect.innerHTML = '';
            ['all', ...(categories || [])].forEach((value) => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value === 'all' ? 'All Categories' : titleCase(value);
                difficultySelect.appendChild(option);
            });
            difficultySelect.value = 'all';
        }

        function renderTopicCards() {
            topicGrid.innerHTML = '';
            if (!filteredTopics.length) {
                const empty = document.createElement('div');
                empty.className = 'topic-empty';
                empty.textContent = 'No topics match this category filter.';
                topicGrid.appendChild(empty);
                return;
            }

            filteredTopics.forEach((topicItem) => {
                const card = document.createElement('div');
                card.className = `topic-card${currentTaskId === topicItem.id ? ' active' : ''}`;
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.innerHTML = `
                    <div class="topic-card-title">${topicItem.title}</div>
                    <div class="topic-card-meta">
                        <span class="topic-meta-pill">${topicItem.topic}</span>
                        <span class="topic-meta-pill">${titleCase(topicItem.difficulty)}</span>
                    </div>
                `;
                card.onclick = () => loadTask(topicItem.id, true);
                card.onkeydown = (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        loadTask(topicItem.id, true);
                    }
                };
                topicGrid.appendChild(card);
            });
        }

        function applyTopicFilter() {
            const selectedCategory = difficultySelect.value || 'all';
            filteredTopics = allTopics.filter((item) => selectedCategory === 'all' || item.difficulty === selectedCategory);
            topicCount.textContent = `Showing ${filteredTopics.length} of ${allTopics.length} topics`;
            renderTopicCards();
        }

        function focusQuestionArea() {
            questionText.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function buildAudioBasePath(taskId) {
            const safeId = encodeURIComponent(String(taskId || '').trim());
            return `/listening/${TASK_SLUG}/audio/${safeId}`;
        }

        function refreshAudioSource(showStatus = false) {
            if (!currentTaskId) {
                return;
            }
            taskAudioPlayer.src = ttsController.buildAudioUrl(
                buildAudioBasePath(currentTaskId),
                ttsController.shouldRepickRandom()
            );
            taskAudioPlayer.load();
            if (showStatus) {
                setStatus(`Voice updated: ${ttsController.getCurrentVoiceLabel()} • ${ttsController.getSpeed()}`);
            }
        }

        function renderOptions(options) {
            currentOptions = Array.isArray(options) ? options : [];
            optionsList.innerHTML = '';
            currentOptions.forEach((option) => {
                const row = document.createElement('label');
                row.className = 'option-row';
                row.setAttribute('data-option-id', String(option.id || '').trim());
                row.innerHTML = `
                    <input type="checkbox" value="${option.id}" data-option-id="${option.id}" style="margin-top:0.2rem;">
                    <span class="option-label">${option.id})</span>
                    <span>${option.text}</span>
                `;
                optionsList.appendChild(row);
            });
        }

        function selectedOptionIds() {
            return Array.from(optionsList.querySelectorAll('input[type="checkbox"]:checked'))
                .map((node) => String(node.getAttribute('data-option-id') || '').trim())
                .filter(Boolean);
        }

        function clearOptionHighlights() {
            optionsList.querySelectorAll('.option-row').forEach((row) => {
                row.classList.remove('correct', 'incorrect', 'missed');
            });
        }

        function applyResultHighlights(analysis) {
            const selectedOptions = Array.isArray((analysis || {}).selected_options) ? analysis.selected_options : [];
            const correctOptions = Array.isArray((analysis || {}).correct_options) ? analysis.correct_options : [];
            const selectedSet = new Set(selectedOptions.map((value) => String(value || '').trim().toUpperCase()));
            const correctSet = new Set(correctOptions.map((value) => String(value || '').trim().toUpperCase()));

            clearOptionHighlights();
            optionsList.querySelectorAll('.option-row').forEach((row) => {
                const optionId = String(row.getAttribute('data-option-id') || '').trim().toUpperCase();
                if (!optionId) {
                    return;
                }

                if (correctSet.has(optionId) && selectedSet.has(optionId)) {
                    row.classList.add('correct');
                    return;
                }
                if (correctSet.has(optionId)) {
                    row.classList.add('missed');
                    return;
                }
                if (selectedSet.has(optionId)) {
                    row.classList.add('incorrect');
                }
            });
        }

        function focusAnswerReview() {
            const target = optionsList.querySelector('.option-row.correct, .option-row.incorrect, .option-row.missed') || optionsList;
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderResult(payload) {
            const total = payload.scores.total;
            scoreHeadline.textContent = `Total Score: ${total.score}/${total.max} (${total.percent}%)`;

            const analysis = payload.analysis || {};
            const selected = Array.isArray(analysis.selected_options) ? analysis.selected_options.join(', ') : '-';
            const correct = Array.isArray(analysis.correct_options) ? analysis.correct_options.join(', ') : '-';
            analysisMeta.textContent = `Selected: ${selected} | Correct: ${correct} | Raw score: ${analysis.raw_score}`;

            feedbackList.innerHTML = '';
            (payload.feedback || []).forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item;
                feedbackList.appendChild(li);
            });

            applyResultHighlights(analysis);
            resultSection.style.display = 'block';
            focusAnswerReview();
        }

        async function loadCatalog() {
            const response = await fetch(`/listening/${TASK_SLUG}/get-catalog`);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || 'Failed to load topic catalog.');
            }
            allTopics = Array.isArray(data.items) ? data.items : [];
        }

        async function loadCategories() {
            try {
                const response = await fetch(`/listening/${TASK_SLUG}/get-categories`);
                const data = await response.json();
                if (response.ok && Array.isArray(data.categories)) {
                    renderCategoryOptions(data.categories);
                    return;
                }
            } catch (_error) {
                // Fallback to catalog categories.
            }

            const fallbackCategories = Array.from(new Set(allTopics.map((item) => String(item.difficulty || 'medium').toLowerCase())));
            renderCategoryOptions(fallbackCategories);
        }

        async function loadTask(taskId = null, shouldFocus = false) {
            clearStatus();
            resultSection.style.display = 'none';

            const query = new URLSearchParams();
            if (taskId) {
                query.set('task_id', taskId);
            } else {
                const selectedCategory = difficultySelect.value || 'all';
                if (selectedCategory !== 'all') {
                    query.set('difficulty', selectedCategory);
                }
            }

            const url = query.toString()
                ? `/listening/${TASK_SLUG}/get-task?${query.toString()}`
                : `/listening/${TASK_SLUG}/get-task`;

            const response = await fetch(url);
            const data = await response.json();
            if (!response.ok) {
                setStatus(data.error || 'Failed to load task.', true);
                return;
            }

            currentTaskId = data.id;
            taskTitle.textContent = data.title;
            questionText.textContent = data.question || 'According to the speaker, which options are correct?';
            renderOptions(data.options || []);
            listeningSection.style.display = 'block';
            refreshAudioSource(false);
            renderTopicCards();
            setStatus(`Loaded: ${data.title} (${data.topic}, ${titleCase(data.difficulty)})`);
            if (shouldFocus) {
                focusQuestionArea();
            }
        }

        async function scoreResponse() {
            clearStatus();
            if (!currentTaskId) {
                setStatus('Load a task first.', true);
                return;
            }

            const selectedOptions = selectedOptionIds();
            if (!selectedOptions.length) {
                setStatus('Select at least one option.', true);
                return;
            }

            scoreBtn.disabled = true;
            try {
                const response = await fetch(`/listening/${TASK_SLUG}/score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task_id: currentTaskId,
                        selected_options: selectedOptions,
                    })
                });
                const data = await response.json();
                if (!response.ok) {
                    setStatus(data.error || 'Scoring failed.', true);
                    return;
                }

                renderResult(data);
                setStatus('Scoring completed.');
            } finally {
                scoreBtn.disabled = false;
            }
        }

        newTaskBtn.addEventListener('click', async () => {
            if (!filteredTopics.length) {
                setStatus('No topic available for current filter.', true);
                return;
            }
            const pick = filteredTopics[Math.floor(Math.random() * filteredTopics.length)];
            await loadTask(pick.id, true);
        });

        difficultySelect.addEventListener('change', async () => {
            applyTopicFilter();
            if (filteredTopics.length) {
                await loadTask(filteredTopics[0].id, true);
            } else {
                currentTaskId = null;
                listeningSection.style.display = 'none';
                setStatus('No topic available for selected category.', true);
            }
        });

        scoreBtn.addEventListener('click', scoreResponse);
        clearBtn.addEventListener('click', () => {
            optionsList.querySelectorAll('input[type="checkbox"]').forEach((node) => {
                node.checked = false;
            });
            clearOptionHighlights();
            clearStatus();
            resultSection.style.display = 'none';
        });

        (async function initPage() {
            try {
                await ttsController.init();
                await loadCatalog();
                await loadCategories();
                applyTopicFilter();
                if (filteredTopics.length) {
                    await loadTask(filteredTopics[0].id);
                }
            } catch (error) {
                setStatus(error.message || 'Failed to initialize page.', true);
            }
        })();
    </script>
</body>

</html>
